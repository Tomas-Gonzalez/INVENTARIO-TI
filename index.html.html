<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventario TI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}

/* Header */
.header{background:#0f172a;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{background:#6366f1;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon i{color:#fff;font-size:19px}
.logo h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.02em}
.logo p{font-size:11px;color:#94a3b8;margin-top:1px}
.header-actions{display:flex;gap:10px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s}
.btn-ghost{background:transparent;border:1px solid #334155;color:#94a3b8}
.btn-ghost:hover{background:#1e293b;color:#fff}
.btn-primary{background:#6366f1;color:#fff}
.btn-primary:hover{background:#4f46e5}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}

/* Tabs */
.tabs{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 28px;display:flex;gap:4px}
.tab{padding:13px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:#64748b;border-bottom:2px solid transparent;transition:all 0.15s;display:inline-flex;align-items:center;gap:7px}
.tab.active{color:#6366f1;border-bottom-color:#6366f1}
.tab:hover:not(.active){color:#475569}

/* Content */
.content{padding:24px 28px;max-width:1400px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #e2e8f0}
.stat-card .label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.stat-card .value{font-size:28px;font-weight:700;color:#0f172a;margin-top:6px}
.stat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.stat-row{display:flex;align-items:center;justify-content:space-between}

/* Type distribution */
.dist-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px 22px}
.dist-card h3{font-size:14px;font-weight:700;color:#0f172a;margin-bottom:16px}
.dist-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dist-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#f8fafc;border-radius:10px;border:1px solid #f1f5f9}
.dist-item i{font-size:20px;color:#6366f1}
.dist-info{flex:1}
.dist-info .name{font-size:12px;color:#64748b;margin-bottom:4px}
.dist-bar-wrap{display:flex;align-items:center;gap:8px}
.dist-bar{flex:1;height:4px;background:#e2e8f0;border-radius:99px;overflow:hidden}
.dist-bar-fill{height:4px;background:#6366f1;border-radius:99px;transition:width .4s}
.dist-count{font-size:13px;font-weight:700;color:#1e293b}

/* Filters */
.filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:15px;pointer-events:none}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;border-radius:8px;border:1px solid #e2e8f0;font-size:13px;background:#fff;color:#1e293b;outline:none}
.search-wrap input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
select.filter{padding:9px 12px;border-radius:8px;border:1px solid #e2e8f0;font-size:13px;background:#fff;color:#1e293b;min-width:160px;cursor:pointer;outline:none}
select.filter:focus{border-color:#6366f1}
.btn-clear{padding:9px 14px;border-radius:8px;border:1px solid #fecaca;background:#fef2f2;color:#ef4444;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px}

/* Table */
.table-wrap{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#64748b;letter-spacing:.07em;text-transform:uppercase;background:#f8fafc;border-bottom:1px solid #e2e8f0;white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{background:#f1f5f9}
thead th span{display:inline-flex;align-items:center;gap:4px}
tbody tr:nth-child(even){background:#fafafa}
tbody tr:hover{background:#f0f4ff}
td{padding:11px 14px;font-size:13px;color:#334155;border-bottom:1px solid #f1f5f9;white-space:nowrap}
td.mono{font-family:monospace;font-size:12px;color:#64748b}
td.inv{font-weight:700;color:#0f172a;font-family:monospace}
.table-footer{padding:10px 14px;border-top:1px solid #f1f5f9;font-size:12px;color:#94a3b8}

/* Empty state */
.empty{padding:52px 28px;text-align:center;color:#94a3b8}
.empty i{font-size:44px;display:block;margin-bottom:14px}
.empty p{font-size:15px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.04em}
.badge .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.badge-activo{background:#d1fae5;color:#065f46}.badge-activo .dot{background:#10b981}
.badge-reparacion{background:#fef3c7;color:#92400e}.badge-reparacion .dot{background:#f59e0b}
.badge-baja{background:#fee2e2;color:#991b1b}.badge-baja .dot{background:#ef4444}
.type-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px}
.type-laptop{background:#ede9fe;color:#5b21b6}
.type-monitor{background:#e0f2fe;color:#0369a1}
.type-software{background:#fce7f3;color:#9d174d}
.type-celular{background:#ecfdf5;color:#065f46}
.avatar{width:24px;height:24px;border-radius:50%;background:#e0e7ff;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#4f46e5;flex-shrink:0}
.user-cell{display:flex;align-items:center;gap:6px}
.muted{color:#cbd5e1}

/* Action buttons */
.action-btn{background:none;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;padding:5px 9px;color:#475569;transition:all .15s}
.action-btn:hover{background:#f1f5f9}
.action-btn.danger{border-color:#fecaca;color:#ef4444}
.action-btn.danger:hover{background:#fef2f2}

/* Modal overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 48px rgba(0,0,0,.18)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10}
.modal-header h2{font-size:17px;font-weight:700;color:#0f172a}
.modal-close{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:22px;line-height:1;padding:2px}
.modal-close:hover{color:#475569}
.modal-body{padding:20px 24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px}
.form-full{grid-column:1/-1}
.form-group label{display:block;font-size:11px;font-weight:700;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #e2e8f0;font-size:14px;color:#1e293b;background:#f8fafc;outline:none;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#6366f1;background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.form-group textarea{resize:vertical;min-height:68px}
.modal-footer{padding:12px 24px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid #f1f5f9;position:sticky;bottom:0;background:#fff}
.btn-cancel{padding:9px 20px;border-radius:8px;border:1px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:14px;color:#475569;font-weight:600}
.btn-save{padding:9px 24px;border-radius:8px;border:none;background:#1e293b;color:#fff;cursor:pointer;font-size:14px;font-weight:600}
.btn-save:hover{background:#0f172a}

/* Confirm modal */
.confirm-modal{background:#fff;border-radius:12px;padding:28px;width:320px;text-align:center;box-shadow:0 16px 32px rgba(0,0,0,.15)}
.confirm-modal i{font-size:36px;color:#f59e0b;display:block;margin-bottom:12px}
.confirm-modal p{margin:0 0 22px;font-size:15px;color:#1e293b;line-height:1.5}
.confirm-actions{display:flex;gap:10px;justify-content:center}

/* Sort indicator */
.sort-asc::after{content:" ↑";color:#6366f1;font-size:10px}
.sort-desc::after{content:" ↓";color:#6366f1;font-size:10px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;z-index:1000;animation:slideUp .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.2)}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-server"></i></div>
    <div>
      <h1>Inventario TI</h1>
      <p id="asset-count">0 activos registrados</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="exportCSV()"><i class="ti ti-download"></i> Exportar CSV</button>
    <button class="btn btn-primary" onclick="openModal()"><i class="ti ti-plus"></i> Agregar Activo</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" id="tab-list" onclick="switchTab('list')"><i class="ti ti-list"></i> Listado</button>
  <button class="tab" id="tab-dashboard" onclick="switchTab('dashboard')"><i class="ti ti-layout-dashboard"></i> Resumen</button>
</div>

<!-- Content -->
<div class="content">

  <!-- Dashboard -->
  <div id="view-dashboard" class="hidden">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-row">
          <div class="stat-icon" style="background:#eef2ff"><i class="ti ti-database" style="color:#6366f1;font-size:17px"></i></div>
        </div>
        <div class="label">Total Activos</div>
        <div class="value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-row">
          <div class="stat-icon" style="background:#d1fae5"><i class="ti ti-circle-check" style="color:#10b981;font-size:17px"></i></div>
        </div>
        <div class="label">Activos</div>
        <div class="value" id="stat-activos" style="color:#10b981">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-row">
          <div class="stat-icon" style="background:#fef3c7"><i class="ti ti-tool" style="color:#f59e0b;font-size:17px"></i></div>
        </div>
        <div class="label">En Reparación</div>
        <div class="value" id="stat-reparacion" style="color:#f59e0b">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-row">
          <div class="stat-icon" style="background:#fee2e2"><i class="ti ti-circle-x" style="color:#ef4444;font-size:17px"></i></div>
        </div>
        <div class="label">Dados de Baja</div>
        <div class="value" id="stat-baja" style="color:#ef4444">0</div>
      </div>
    </div>
    <div class="dist-card">
      <h3>Distribución por Tipo</h3>
      <div class="dist-grid" id="dist-grid"></div>
    </div>
  </div>

  <!-- List -->
  <div id="view-list">
    <div class="filters">
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input id="search" type="text" placeholder="Buscar por marca, modelo, usuario, serie..." oninput="renderTable()"/>
      </div>
      <select class="filter" id="filter-type" onchange="renderTable()">
        <option value="">Todos los tipos</option>
        <option>Computador / Laptop</option>
        <option>Monitor / Periférico</option>
        <option>Software / Licencia</option>
        <option>Celular / Tablet</option>
      </select>
      <select class="filter" id="filter-status" onchange="renderTable()">
        <option value="">Todos los estados</option>
        <option>Activo</option>
        <option>En reparación</option>
        <option>Baja</option>
      </select>
      <select class="filter" id="filter-region" onchange="renderTable()">
        <option value="">Todas las regiones</option>
        <option>Norte</option><option>Sur</option><option>Centro</option>
        <option>Oriente</option><option>Occidente</option><option>Internacional</option>
      </select>
      <button class="btn-clear hidden" id="btn-clear" onclick="clearFilters()"><i class="ti ti-x"></i> Limpiar</button>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th onclick="toggleSort('inventario')"><span>N° Inv. <span id="sort-inventario"></span></span></th>
              <th onclick="toggleSort('tipo')"><span>Tipo <span id="sort-tipo"></span></span></th>
              <th onclick="toggleSort('marca')"><span>Marca <span id="sort-marca"></span></span></th>
              <th onclick="toggleSort('modelo')"><span>Modelo <span id="sort-modelo"></span></span></th>
              <th onclick="toggleSort('serie')"><span>Serie <span id="sort-serie"></span></span></th>
              <th onclick="toggleSort('asignado')"><span>Asignado a <span id="sort-asignado"></span></span></th>
              <th onclick="toggleSort('estado')"><span>Estado <span id="sort-estado"></span></span></th>
              <th onclick="toggleSort('ubicacion')"><span>Ubicación <span id="sort-ubicacion"></span></span></th>
              <th onclick="toggleSort('region')"><span>Región <span id="sort-region"></span></span></th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="table-footer" id="table-footer"></div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay hidden" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nuevo Activo TI</h2>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>N° Inventario *</label>
          <input id="f-inventario" type="text" placeholder="Ej: TI-2024-001"/>
        </div>
        <div class="form-group">
          <label>N° Serie / Código</label>
          <input id="f-serie" type="text" placeholder="Número de serie"/>
        </div>
        <div class="form-group">
          <label>Tipo de Activo *</label>
          <select id="f-tipo">
            <option value="">Seleccionar...</option>
            <option>Computador / Laptop</option>
            <option>Monitor / Periférico</option>
            <option>Software / Licencia</option>
            <option>Celular / Tablet</option>
          </select>
        </div>
        <div class="form-group">
          <label>Estado</label>
          <select id="f-estado">
            <option>Activo</option>
            <option>En reparación</option>
            <option>Baja</option>
          </select>
        </div>
        <div class="form-group">
          <label>Marca *</label>
          <input id="f-marca" type="text" placeholder="Dell, HP, Apple..."/>
        </div>
        <div class="form-group">
          <label>Modelo *</label>
          <input id="f-modelo" type="text" placeholder="Latitude 5520, MacBook Pro..."/>
        </div>
        <div class="form-group">
          <label>Asignado a</label>
          <input id="f-asignado" type="text" placeholder="Nombre del usuario"/>
        </div>
        <div class="form-group">
          <label>Ubicación / Sede</label>
          <input id="f-ubicacion" type="text" placeholder="Oficina, piso, sala..."/>
        </div>
        <div class="form-group">
          <label>Región</label>
          <select id="f-region">
            <option value="">Seleccionar...</option>
            <option>Norte</option><option>Sur</option><option>Centro</option>
            <option>Oriente</option><option>Occidente</option><option>Internacional</option>
          </select>
        </div>
        <div class="form-group form-full">
          <label>Notas</label>
          <textarea id="f-notas" placeholder="Observaciones adicionales..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveAsset()">Guardar Activo</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="overlay hidden" id="confirm-overlay">
  <div class="confirm-modal">
    <i class="ti ti-alert-triangle"></i>
    <p>¿Eliminar este activo del inventario?<br><strong>Esta acción no se puede deshacer.</strong></p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="cancelDelete()">Cancelar</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'inventario_ti_v1';
let assets = [];
let editId = null;
let deleteId = null;
let sortField = 'inventario';
let sortDir = 'asc';
let currentTab = 'list';

// ── Storage ──────────────────────────────────────────────
function load() {
  try { assets = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { assets = []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(assets));
  updateCount();
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ── Tabs ─────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('view-list').classList.toggle('hidden', tab !== 'list');
  document.getElementById('view-dashboard').classList.toggle('hidden', tab !== 'dashboard');
  document.getElementById('tab-list').classList.toggle('active', tab === 'list');
  document.getElementById('tab-dashboard').classList.toggle('active', tab === 'dashboard');
  if (tab === 'dashboard') renderDashboard();
}

// ── Badges ────────────────────────────────────────────────
function statusBadge(s) {
  const map = { 'Activo':'activo', 'En reparación':'reparacion', 'Baja':'baja' };
  const cls = map[s] || 'activo';
  return `<span class="badge badge-${cls}"><span class="dot"></span>${s}</span>`;
}
function typeBadge(t) {
  const map = {
    'Computador / Laptop':'laptop', 'Monitor / Periférico':'monitor',
    'Software / Licencia':'software', 'Celular / Tablet':'celular'
  };
  const cls = map[t] || 'laptop';
  return `<span class="type-badge type-${cls}">${t}</span>`;
}
function typeIcon(t) {
  const map = { 'Computador / Laptop':'ti-device-laptop', 'Monitor / Periférico':'ti-device-desktop',
    'Software / Licencia':'ti-license', 'Celular / Tablet':'ti-device-mobile' };
  return map[t] || 'ti-device-desktop';
}

// ── Count & Filters ───────────────────────────────────────
function updateCount() {
  document.getElementById('asset-count').textContent = assets.length + ' activos registrados';
}
function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filter-type').value = '';
  document.getElementById('filter-status').value = '';
  document.getElementById('filter-region').value = '';
  renderTable();
}

// ── Sort ──────────────────────────────────────────────────
function toggleSort(field) {
  if (sortField === field) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortField = field; sortDir = 'asc'; }
  ['inventario','tipo','marca','modelo','serie','asignado','estado','ubicacion','region'].forEach(f => {
    const el = document.getElementById('sort-'+f);
    if (el) el.textContent = f === sortField ? (sortDir === 'asc' ? '↑' : '↓') : '';
  });
  renderTable();
}

// ── Table ─────────────────────────────────────────────────
function getFiltered() {
  const q = (document.getElementById('search')?.value||'').toLowerCase();
  const ft = document.getElementById('filter-type')?.value||'';
  const fs = document.getElementById('filter-status')?.value||'';
  const fr = document.getElementById('filter-region')?.value||'';

  let show = document.getElementById('btn-clear');
  if (show) show.classList.toggle('hidden', !q && !ft && !fs && !fr);

  let r = assets.filter(a => {
    if (q && !['inventario','tipo','marca','modelo','serie','asignado','ubicacion','region']
      .some(k => (a[k]||'').toLowerCase().includes(q))) return false;
    if (ft && a.tipo !== ft) return false;
    if (fs && a.estado !== fs) return false;
    if (fr && a.region !== fr) return false;
    return true;
  });

  r.sort((a, b) => {
    const av = (a[sortField]||'').toLowerCase(), bv = (b[sortField]||'').toLowerCase();
    return sortDir === 'asc' ? av.localeCompare(bv, 'es') : bv.localeCompare(av, 'es');
  });
  return r;
}

function renderTable() {
  const filtered = getFiltered();
  const tbody = document.getElementById('table-body');

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty">
      <i class="ti ti-inbox"></i>
      <p>${assets.length === 0 ? 'No hay activos registrados. ¡Agrega el primero!' : 'No hay resultados para esta búsqueda.'}</p>
    </div></td></tr>`;
  } else {
    tbody.innerHTML = filtered.map(a => `
      <tr>
        <td class="inv">${esc(a.inventario)}</td>
        <td>${typeBadge(a.tipo)}</td>
        <td>${esc(a.marca)}</td>
        <td>${esc(a.modelo)}</td>
        <td class="mono">${esc(a.serie)||'—'}</td>
        <td>${a.asignado
          ? `<span class="user-cell"><span class="avatar">${a.asignado.charAt(0).toUpperCase()}</span>${esc(a.asignado)}</span>`
          : '<span class="muted">—</span>'}</td>
        <td>${statusBadge(a.estado)}</td>
        <td>${esc(a.ubicacion)||'—'}</td>
        <td>${esc(a.region)||'—'}</td>
        <td style="display:flex;gap:6px">
          <button class="action-btn" onclick="openEdit('${a.id}')" title="Editar"><i class="ti ti-edit" style="font-size:13px"></i></button>
          <button class="action-btn danger" onclick="askDelete('${a.id}')" title="Eliminar"><i class="ti ti-trash" style="font-size:13px"></i></button>
        </td>
      </tr>`).join('');
  }
  document.getElementById('table-footer').textContent =
    `Mostrando ${filtered.length} de ${assets.length} activos`;
}

function esc(v) {
  if (!v) return '';
  return v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Dashboard ─────────────────────────────────────────────
function renderDashboard() {
  document.getElementById('stat-total').textContent = assets.length;
  document.getElementById('stat-activos').textContent = assets.filter(a=>a.estado==='Activo').length;
  document.getElementById('stat-reparacion').textContent = assets.filter(a=>a.estado==='En reparación').length;
  document.getElementById('stat-baja').textContent = assets.filter(a=>a.estado==='Baja').length;

  const types = ['Computador / Laptop','Monitor / Periférico','Software / Licencia','Celular / Tablet'];
  const total = assets.length || 1;
  document.getElementById('dist-grid').innerHTML = types.map(t => {
    const cnt = assets.filter(a=>a.tipo===t).length;
    const pct = Math.round(cnt/total*100);
    return `<div class="dist-item">
      <i class="ti ${typeIcon(t)}"></i>
      <div class="dist-info">
        <div class="name">${t}</div>
        <div class="dist-bar-wrap">
          <div class="dist-bar"><div class="dist-bar-fill" style="width:${pct}%"></div></div>
          <span class="dist-count">${cnt}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Modal ─────────────────────────────────────────────────
function openModal() {
  editId = null;
  document.getElementById('modal-title').textContent = 'Nuevo Activo TI';
  ['inventario','serie','marca','modelo','asignado','ubicacion','notas'].forEach(f =>
    document.getElementById('f-'+f).value = '');
  document.getElementById('f-tipo').value = '';
  document.getElementById('f-estado').value = 'Activo';
  document.getElementById('f-region').value = '';
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function openEdit(id) {
  const a = assets.find(x=>x.id===id);
  if (!a) return;
  editId = id;
  document.getElementById('modal-title').textContent = 'Editar Activo';
  ['inventario','serie','marca','modelo','asignado','ubicacion','notas'].forEach(f =>
    document.getElementById('f-'+f).value = a[f]||'');
  document.getElementById('f-tipo').value = a.tipo||'';
  document.getElementById('f-estado').value = a.estado||'Activo';
  document.getElementById('f-region').value = a.region||'';
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  editId = null;
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function saveAsset() {
  const inv = document.getElementById('f-inventario').value.trim();
  const tipo = document.getElementById('f-tipo').value;
  const marca = document.getElementById('f-marca').value.trim();
  const modelo = document.getElementById('f-modelo').value.trim();
  if (!inv || !tipo || !marca || !modelo) {
    showToast('⚠️ Completa los campos obligatorios: N° Inventario, Tipo, Marca y Modelo.', '#f59e0b');
    return;
  }
  const data = {
    inventario: inv, tipo, marca, modelo,
    serie: document.getElementById('f-serie').value.trim(),
    asignado: document.getElementById('f-asignado').value.trim(),
    estado: document.getElementById('f-estado').value,
    ubicacion: document.getElementById('f-ubicacion').value.trim(),
    region: document.getElementById('f-region').value,
    notas: document.getElementById('f-notas').value.trim(),
  };
  if (editId) {
    const i = assets.findIndex(a=>a.id===editId);
    if (i>-1) assets[i] = { ...assets[i], ...data };
    showToast('✓ Activo actualizado correctamente');
  } else {
    assets.push({ id: genId(), createdAt: new Date().toISOString(), ...data });
    showToast('✓ Activo agregado al inventario');
  }
  save(); renderTable();
  if (currentTab === 'dashboard') renderDashboard();
  closeModal();
}

// ── Delete ────────────────────────────────────────────────
function askDelete(id) {
  deleteId = id;
  document.getElementById('confirm-overlay').classList.remove('hidden');
}
function cancelDelete() {
  deleteId = null;
  document.getElementById('confirm-overlay').classList.add('hidden');
}
function confirmDelete() {
  assets = assets.filter(a=>a.id!==deleteId);
  save(); renderTable();
  if (currentTab === 'dashboard') renderDashboard();
  cancelDelete();
  showToast('✓ Activo eliminado', '#ef4444');
}

// ── Export CSV ────────────────────────────────────────────
function exportCSV() {
  if (assets.length === 0) { showToast('No hay activos para exportar', '#f59e0b'); return; }
  const headers = ['Inventario','Tipo','Marca','Modelo','Serie','Asignado a','Estado','Ubicación','Región','Notas'];
  const rows = assets.map(a =>
    [a.inventario,a.tipo,a.marca,a.modelo,a.serie,a.asignado,a.estado,a.ubicacion,a.region,a.notas]
      .map(v=>`"${(v||'').replace(/"/g,'""')}"`)
      .join(',')
  );
  const bom = '\uFEFF';
  const blob = new Blob([bom + headers.join(',') + '\n' + rows.join('\n')], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'inventario_TI_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('✓ CSV exportado correctamente');
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg, color='#10b981') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderLeft = `4px solid ${color}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── Init ──────────────────────────────────────────────────
load();
updateCount();
renderTable();
</script>
